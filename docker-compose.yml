version: '3.8'

services:
  # Web: 使用 Nginx 直接掛載 HTML
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

  # API: 使用一個簡單的 Node.js 輔助工具來回應 JSON (這裡用 mendhak/http-https-echo 作為示範)
  api:
    image: mendhak/http-https-echo
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080

  # DB: PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine

volumes:
  db-data:
